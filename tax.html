<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>消費税計算(税込⇔税抜) | サクッとツール箱</title>
  <meta name="description" content="税抜価格から税込価格、税込価格から税抜価格を計算する無料ツール。消費税10%・軽減税率8%に対応し、端数処理(切り捨て・四捨五入・切り上げ)も選べます。">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="container">
      <a class="site-title" href="./index.html">サクッとツール箱</a>
    </div>
  </header>

  <main class="container">
    <h1>消費税計算(税込⇔税抜)</h1>
    <p class="lead">金額と税率を入れるだけで、税込・税抜・消費税額をまとめて計算します。</p>

    <div class="card">
      <div class="row">
        <div>
          <label for="amount">金額(円)</label>
          <input type="number" id="amount" min="0" step="1" value="1000">
        </div>
        <div>
          <label for="direction">計算の向き</label>
          <select id="direction">
            <option value="add">税抜 → 税込</option>
            <option value="remove">税込 → 税抜</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="rate">税率</label>
          <select id="rate">
            <option value="10">10%(標準)</option>
            <option value="8">8%(軽減税率)</option>
          </select>
        </div>
        <div>
          <label for="rounding">税額の端数処理</label>
          <select id="rounding">
            <option value="floor">切り捨て(一般的)</option>
            <option value="round">四捨五入</option>
            <option value="ceil">切り上げ</option>
          </select>
        </div>
      </div>
      <button id="calc">計算する</button>
      <div class="result" id="result" hidden></div>
      <div class="error" id="error" hidden></div>
      <p class="note">端数処理は事業者によって異なります(法令上の指定はありません)。レシートと一致しない場合は端数処理を変えてみてください。</p>
    </div>

    <!-- ▼ AdSense: 審査承認後にここへ広告ユニットのコードを貼る ▼ -->
    <!-- ▲ AdSense ▲ -->

    <div class="card">
      <h2>使い方・補足</h2>
      <ul>
        <li>軽減税率 8% は、飲食料品(外食・酒類を除く)や定期購読の新聞などに適用されます。</li>
        <li>「税込 → 税抜」は、レシートの合計から本体価格を逆算したいときに便利です。</li>
      </ul>
    </div>
  </main>

  <footer>
    <div class="container">
      <nav>
        <a href="./index.html">ホーム</a>
        <a href="./privacy.html">プライバシーポリシー</a>
      </nav>
      <p>© 2026 サクッとツール箱</p>
    </div>
  </footer>

  <script type="module">
    import { addTax, removeTax } from "./js/lib/tax.mjs";
    import { copyRows } from "./js/copy-ui.mjs";

    const $ = (id) => document.getElementById(id);
    const yen = (n) => `${n.toLocaleString("ja-JP")} 円`;

    $("calc").addEventListener("click", () => {
      const resultEl = $("result");
      const errorEl = $("error");
      resultEl.hidden = true;
      errorEl.hidden = true;
      try {
        const amount = Number($("amount").value);
        const rate = Number($("rate").value);
        const rounding = $("rounding").value;
        const r = $("direction").value === "add"
          ? addTax(amount, rate, rounding)
          : removeTax(amount, rate, rounding);
        resultEl.innerHTML =
          `<p>税抜 ${yen(r.price)} + 消費税 ${yen(r.tax)} = <strong>税込 ${yen(r.total)}</strong></p>` +
          copyRows([
            ["税込", String(r.total)],
            ["税抜", String(r.price)],
            ["消費税", String(r.tax)],
          ]);
        resultEl.hidden = false;
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
